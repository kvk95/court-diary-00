<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <title>{{ title }}</title>

        <!-- Google Font: Comfortaa (clean & modern) -->
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;700&display=swap"
            rel="stylesheet">

        <style>
            @page {
                size: A4 portrait;
                /* Change to 'A4 landscape' when needed */
                margin: 1cm;

                @bottom-left {
                    content: "Total Records: {{ total_records }}";
                    font-size: 9pt;
                    color: #555;
                }

                @bottom-right {
                    content: "Page " counter(page) " of " counter(pages);
                    font-size: 9pt;
                    color: #555;
                }

                @top-left {
                    content: "{{company_name}}";
                    font-size: 10pt;
                    font-weight: bold;
                    color: #2c3e50;
                }

                @top-right {
                    content: "Nya Buy.";
                    font-size: 10pt;
                    font-weight: 500;
                    color: #2c3e50;
                }
            }

            body {
                font-family: 'Comfortaa', sans-serif;
                font-size: 10pt;
                color: #333;
                line-height: 1.4;
                margin: 0;
            }

            .container {
                width: 100%;
            }

            .header {
                text-align: center;
                margin-bottom: 1.5cm;
                padding-bottom: 0.5cm;
                border-bottom: 2px solid #4a90e2;
            }

            .title {
                font-size: 20pt;
                font-weight: 700;
                color: #4a90e2;
                margin: 0.4cm 0 0.2cm 0;
            }

            .meta {
                font-size: 10pt;
                color: #555;
                margin-top: 0.3cm;
                text-align: left;
                font-family: monospace;
            }

            .table-container {
                width: 100%;
                overflow-x: auto;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 0.6cm;
                font-size: 9.5pt;
            }

            th,
            td {
                padding: 8px 6px;
                border: 1px solid #ddd;
                text-align: left;
            }

            th {
                background-color: #f5f7fa;
                font-weight: bold;
                color: #2c3e50;
                border-bottom: 2px solid #4a90e2;
            }

            tr:nth-child(even) {
                background-color: #fafbfc;
            }

            tr:hover {
                background-color: #f0f7ff;
            }

            td {
                font-size: 8.5pt;
            }

            /* Column alignments & formatting classes */
            .align-left {
                text-align: left;
            }

            .align-center {
                text-align: center;
            }

            .align-right {
                text-align: right;
            }

            .currency::before {
                content: "₹ ";
            }

            .currency {
                font-family: monospace;
            }

            .status-draft {
                color: #e67e22;
                font-weight: 600;
            }

            .status-pending {
                color: #f39c12;
                font-weight: 600;
            }

            .status-paid {
                color: #27ae60;
                font-weight: 600;
            }

            .status-overdue {
                color: #c0392b;
                font-weight: 600;
            }

            .footer-note {
                position: fixed;
                bottom: 0.8cm;
                left: 1cm;
                right: 1cm;
                text-align: center;
                font-size: 8.5pt;
                color: #777;
                border-top: 1px solid #eee;
                padding-top: 0.4cm;
            }
        </style>
    </head>

    <body>

        <div class="container">

            <!-- Header -->
            <div class="header">
                <div class="title">{{ title }}</div>
                <div class="meta">
                    {% if generated_date %}
                    Generated on: {{ generated_date }}
                    {% endif %}
                </div>
            </div>

            <!-- Dynamic Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            {% for col in columns %}
                            <th class="align-center">
                                {{ col.label }}
                            </th>
                            {% endfor %}
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in data %}
                        <tr>
                            {% for col in columns %}
                            <td class="
                                    align-{{ col.align|default('left') }} 
                                    {% if col.format == 'status' %}status-{{ row[col.key]|lower|replace(' ', '-') }}{% endif %}
                                ">
                                {{ row[col.key] }}
                            </td>
                            {% endfor %}
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

        </div>

    </body>

</html>
