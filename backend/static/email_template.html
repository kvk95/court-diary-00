<!doctype html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>NyaDesk</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f1f5f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            color: #1e293b;
        }

        .email-wrapper {
            width: 100%;
            background-color: #f1f5f9;
            padding: 40px 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            padding-bottom: 24px;
        }

        .header-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.3px;
        }

        /* ── CARD ── */
        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 24px rgba(15, 23, 42, 0.06), 0 1px 4px rgba(15, 23, 42, 0.04);
            overflow: hidden;
        }

        /* ── TOP ACCENT BAR ── */
        .card-accent {
            height: 4px;
            background: linear-gradient(90deg, #0ea5e9 0%, #38bdf8 50%, #7dd3fc 100%);
        }

        /* ── CARD BODY ── */
        .card-body {
            padding: 40px 48px;
        }

        /* ── GREETING ── */
        .greeting-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            font-size: 22px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 10px;
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        p {
            font-size: 15px;
            color: #475569;
            line-height: 1.7;
            margin-bottom: 16px;
        }

        p:last-child {
            margin-bottom: 0;
        }

        /* ── DIVIDER ── */
        .divider {
            border: none;
            border-top: 1px solid #f1f5f9;
            margin: 28px 0;
        }

        /* ── INFO BOX ── */
        .info-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-left: 3px solid #0ea5e9;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
        }

        .info-box p {
            margin-bottom: 0;
            color: #334155;
            font-size: 14px;
        }

        /* ── BUTTON ── */
        .btn-wrapper {
            text-align: center;
            margin: 28px 0;
        }

        .btn {
            display: inline-block;
            background: #0ea5e9;
            color: #ffffff !important;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 32px;
            border-radius: 10px;
            text-decoration: none;
            letter-spacing: 0.1px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #0284c7;
        }

        /* ── SECONDARY BUTTON ── */
        .btn-secondary {
            display: inline-block;
            background: transparent;
            color: #0ea5e9 !important;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 8px;
            border: 1.5px solid #bae6fd;
            text-decoration: none;
            margin-top: 10px;
        }

        /* ── HEARING CARD (for case-specific emails) ── */
        .hearing-item {
            display: flex;
            gap: 14px;
            padding: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .hearing-dot {
            width: 10px;
            height: 10px;
            background: #0ea5e9;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .hearing-details {
            flex: 1;
        }

        .hearing-title {
            font-size: 13px;
            font-weight: 600;
            color: #0ea5e9;
            margin-bottom: 4px;
        }

        .hearing-parties {
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 2px;
        }

        .hearing-meta {
            font-size: 13px;
            color: #64748b;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .badge-upcoming {
            background: #eff6ff;
            color: #3b82f6;
        }

        .badge-completed {
            background: #f0fdf4;
            color: #16a34a;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 28px 16px 8px;
        }

        .footer p {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 4px;
        }

        .footer a {
            color: #0ea5e9;
            text-decoration: none;
        }

        .footer-links {
            margin: 12px 0 8px;
        }

        .footer-links a {
            font-size: 12px;
            color: #64748b;
            text-decoration: none;
            margin: 0 10px;
        }

        .footer-links a:hover {
            color: #0ea5e9;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 520px) {
            .card-body {
                padding: 28px 24px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
